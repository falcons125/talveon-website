# Netlify Configuration - Talveon Website
# Reconstructed from live deploy (69c040e6, 2026-03-22)

[build]
  publish = "."

# Redirects - old pages to homepage
[[redirects]]
  from = "/services"
  to = "/"
  status = 301

[[redirects]]
  from = "/services.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/solutions"
  to = "/"
  status = 301

[[redirects]]
  from = "/solutions.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/terms-of-use"
  to = "/privacy-policy"
  status = 301

[[redirects]]
  from = "/terms-of-use.html"
  to = "/privacy-policy"
  status = 301

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Robots-Tag = "noindex, nofollow"

# Cache control for static assets
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
